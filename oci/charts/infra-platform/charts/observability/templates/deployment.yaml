apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observability.fullname" . }}
  labels:
    app: observability
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: observability
  template:
    metadata:
      labels:
        app: observability
    spec:
      containers:
        - name: observability
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
