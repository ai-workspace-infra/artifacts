apiVersion: v1
kind: Service
metadata:
  name: {{ include "xworkspace-console.fullname" . }}
  labels:
    app: xworkspace-console
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: xworkspace-console
